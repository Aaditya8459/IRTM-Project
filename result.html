<!DOCTYPE html>
<html>
<head>
    <title>Match Result</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            overflow: hidden;
            color: white;
        }

        /* Floating circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            animation: float 6s infinite ease-in-out;
        }

        .circle:nth-child(1) {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 15%;
        }

        .circle:nth-child(2) {
            width: 150px;
            height: 150px;
            bottom: 10%;
            right: 15%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* Result box */
        .box {
            text-align: center;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(18px);
            padding: 50px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: pop 0.6s ease;
            z-index: 1;
            background-color: #fbd6df;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #ff416c;
        }

        .role {
            font-size: 18px;
            margin-bottom: 20px;
            opacity: 0.9;
            color: #ff416c;
        }

        .score {
            font-size: 70px;
            font-weight: bold;
            margin: 20px 0;
            animation: pop 0.6s ease;
            color: #ff416c;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 20px rgba(255,65,108,0.5);
        }

        @keyframes pop {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body>

<!-- Background animation -->
<div class="circle"></div>
<div class="circle"></div>

<div class="box">
    <h1>Match Result</h1>
    <div class="role">Role: {{role}}</div>

    <div class="score">
        {{score}}%
    </div>

    <a href="/">Check Another</a>
</div>

</body>
</html>
